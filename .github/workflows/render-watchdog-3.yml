name: Keep Render Alive — Layer 3 (every 5min, +2)

# v4.2: Layer 3 of 4. Runs at :02, :07, :12... — offset from Layers 1-2.

on:
  schedule:
    - cron: '2-59/5 * * * *'   # :02, :07, :12, :17...
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Primary (keep-alive, layer 3)
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "${RENDER_URL}/health")
          echo "Render Primary: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Render Primary not responding (layer 3)!"
          fi

      - name: Ping Render Secondary (keep-alive, layer 3)
        env:
          RENDER_URL_2: ${{ secrets.RENDER_URL_2 }}
        run: |
          if [ -z "$RENDER_URL_2" ]; then
            echo "RENDER_URL_2 not set, skipping"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "${RENDER_URL_2}/health")
          echo "Render Secondary: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Render Secondary not responding (layer 3)!"
          fi
