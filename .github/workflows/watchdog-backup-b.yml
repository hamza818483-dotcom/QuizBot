name: Watchdog Backup B (10min)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping_and_check:
    runs-on: ubuntu-latest
    steps:
      - name: Self ping Render Primary
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --retry 2 "${RENDER_URL}/health" || echo "000")
          echo "Primary: $STATUS"

      - name: Self ping Render Secondary
        env:
          RENDER_URL_2: ${{ secrets.RENDER_URL_2 }}
        run: |
          if [ -z "$RENDER_URL_2" ]; then exit 0; fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --retry 2 "${RENDER_URL_2}/health" || echo "000")
          echo "Secondary: $STATUS"

      - name: Check watchdog-1/2/3 last run + trigger if failed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          for WF in watchdog-1.yml watchdog-2.yml watchdog-3.yml; do
            CONCLUSION=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${REPO}/actions/workflows/${WF}/runs?per_page=1" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('workflow_runs',[]); print(r[0]['conclusion'] if r else 'none')")
            echo "$WF last conclusion: $CONCLUSION"
            if [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ] || [ "$CONCLUSION" = "none" ]; then
              echo "::warning::$WF failed — triggering backup run"
              curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/actions/workflows/${WF}/dispatches" \
                -d '{"ref":"main"}'
            fi
          done
