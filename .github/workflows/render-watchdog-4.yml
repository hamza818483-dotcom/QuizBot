name: Keep Render Alive â€” Layer 4 (every 5min, +3) + Primaryâ†’Secondary Failover

# v4.2: Layer 4 of 4. Runs at :03, :08, :13... AND also checks if the
# Primary Render instance is down while it's the active webhook target â€”
# if so, switches the webhook to the Secondary Render account instead.
# This is the actual primaryâ†”secondary failover layer; layers 1-3 are
# pure keep-alive pings only.

on:
  schedule:
    - cron: '3-59/5 * * * *'   # :03, :08, :13, :18...
  workflow_dispatch:

jobs:
  ping_and_failover:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Primary (keep-alive, layer 4)
        id: primary_check
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "${RENDER_URL}/health")
          echo "primary_status=$STATUS" >> $GITHUB_OUTPUT
          echo "Render Primary: $STATUS"

      - name: Ping Render Secondary (keep-alive, layer 4)
        env:
          RENDER_URL_2: ${{ secrets.RENDER_URL_2 }}
        run: |
          if [ -z "$RENDER_URL_2" ]; then
            echo "RENDER_URL_2 not set, skipping"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "${RENDER_URL_2}/health")
          echo "Render Secondary: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Render Secondary not responding (layer 4)!"
          fi

      - name: Failover to Secondary if Primary down and webhook points to Primary
        if: ${{ steps.primary_check.outputs.primary_status != '200' }}
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          RENDER_URL_2: ${{ secrets.RENDER_URL_2 }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          if [ -z "$RENDER_URL_2" ]; then
            echo "RENDER_URL_2 not set, skipping failover"
            exit 0
          fi
          CURRENT=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getWebhookInfo" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('url',''))" 2>/dev/null || echo "")
          echo "Current webhook: $CURRENT"
          PRIMARY_HOST=$(echo "${RENDER_URL}" | sed -E 's#https?://##')
          if [[ "$CURRENT" == *"$PRIMARY_HOST"* ]]; then
            SECONDARY_WEBHOOK="${RENDER_URL_2}/webhook"
            echo "::warning::Primary Render down â€” switching webhook to Secondary: $SECONDARY_WEBHOOK"
            curl -s "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
              -d "url=$SECONDARY_WEBHOOK" \
              -d "drop_pending_updates=false"
            if [ -n "$OWNER_ID" ]; then
              MSG="đź”„ AUTO-FAILOVER HOLO!%0A%0APrimary Render DOWN dhora porechhe.%0ABot ekhon Secondary Render e switch hoyeche.%0A%0APrimary: ${RENDER_URL}%0ASecondary: ${RENDER_URL_2}%0A%0ABot active ache, kintu Primary check koro druto."
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                -d "chat_id=${OWNER_ID}" -d "text=${MSG}" || true
            fi
          fi

      - name: Switch back to Primary if it has recovered
        if: ${{ steps.primary_check.outputs.primary_status == '200' }}
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          RENDER_URL_2: ${{ secrets.RENDER_URL_2 }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          CURRENT=$(curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getWebhookInfo" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('url',''))" 2>/dev/null || echo "")
          SECONDARY_HOST=$(echo "${RENDER_URL_2}" | sed -E 's#https?://##')
          if [[ -n "$SECONDARY_HOST" && "$CURRENT" == *"$SECONDARY_HOST"* ]]; then
            PRIMARY_WEBHOOK="${RENDER_URL}/webhook"
            echo "âś… Primary Render recovered â€” switching webhook back: $PRIMARY_WEBHOOK"
            curl -s "https://api.telegram.org/bot${BOT_TOKEN}/setWebhook" \
              -d "url=$PRIMARY_WEBHOOK" \
              -d "drop_pending_updates=false"
            if [ -n "$OWNER_ID" ]; then
              MSG="âś… PRIMARY RENDER ABAR THIK!%0A%0AWebhook Secondary theke Primary te switch back kora hoyeche.%0A%0APrimary: ${RENDER_URL}"
              curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
                -d "chat_id=${OWNER_ID}" -d "text=${MSG}" || true
            fi
          fi

      - name: Alert if BOTH Primary and Secondary are down
        if: ${{ steps.primary_check.outputs.primary_status != '200' }}
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
          RENDER_URL_2: ${{ secrets.RENDER_URL_2 }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          if [ -z "$RENDER_URL_2" ] || [ -z "$OWNER_ID" ]; then
            exit 0
          fi
          SEC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 "${RENDER_URL_2}/health" || echo "000")
          if [ "$SEC_STATUS" != "200" ]; then
            MSG="đźš¨ CRITICAL: BOTH Render accounts DOWN!%0A%0APrimary: ${RENDER_URL}%0ASecondary: ${RENDER_URL_2}%0A%0ABot is COMPLETELY OFFLINE â€” manual check needed NOW."
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d "chat_id=${OWNER_ID}" -d "text=${MSG}" || true
          fi

