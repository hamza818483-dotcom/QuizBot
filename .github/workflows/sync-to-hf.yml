name: Sync to Hugging Face Space

# v4.6: HF04/quizbot-backup is PRIMARY. hamza-02/QuizBot kept as FALLBACK
# (old Space still running/serving traffic — its build-queue bug only
# affects new deploys, not the already-running instance).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Primary HF Space (HF04/quizbot-backup)
        env:
          HF_TOKEN_PRIMARY: ${{ secrets.HF_TOKEN_PRIMARY }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf-primary https://HF04:${HF_TOKEN_PRIMARY}@huggingface.co/spaces/HF04/quizbot-backup
          git push hf-primary main:main --force

      - name: Sync Secrets to Primary HF Space
        env:
          HF_TOKEN_PRIMARY: ${{ secrets.HF_TOKEN_PRIMARY }}
          SPACE_SECRETS_JSON: ${{ secrets.SPACE_SECRETS_JSON }}
        run: |
          pip install --quiet huggingface_hub
          python3 - <<'PYEOF'
          import os, json
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN_PRIMARY"])
          space_id = "HF04/quizbot-backup"
          secrets_map = json.loads(os.environ["SPACE_SECRETS_JSON"])
          for key, value in secrets_map.items():
              api.add_space_secret(repo_id=space_id, key=key, value=value)
              print(f"Added: {key}")
          PYEOF

      - name: Push to Fallback HF Space (hamza-02/QuizBot)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf-fallback https://hamza-02:${HF_TOKEN}@huggingface.co/spaces/hamza-02/QuizBot
          git push hf-fallback main:main --force || echo "Fallback push failed (non-blocking)"
