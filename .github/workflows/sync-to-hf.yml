name: Sync to Hugging Face Space

# v4.5: Switched to HF04/quizbot-backup (old hamza-02/QuizBot Space stuck
# in a build-queue bug that HF platform itself couldn't recover from).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf https://HF04:${HF_TOKEN}@huggingface.co/spaces/HF04/quizbot-backup
          git push hf main:main --force
