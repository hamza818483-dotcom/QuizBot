name: Sync to Hugging Face Space

# v4.6: HF04/quizbot-backup is PRIMARY. hamza-02/QuizBot kept as FALLBACK
# (old Space still running/serving traffic — its build-queue bug only
# affects new deploys, not the already-running instance).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Primary HF Space (HF04/quizbot-backup)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf-primary https://HF04:${HF_TOKEN}@huggingface.co/spaces/HF04/quizbot-backup
          git push hf-primary main:main --force

      - name: Push to Fallback HF Space (hamza-02/QuizBot)
        env:
          HF_TOKEN_FALLBACK: ${{ secrets.HF_TOKEN_FALLBACK }}
        run: |
          git remote add hf-fallback https://hamza-02:${HF_TOKEN_FALLBACK}@huggingface.co/spaces/hamza-02/QuizBot
          git push hf-fallback main:main --force || echo "Fallback push failed (non-blocking)"
