name: Sync to Hugging Face Space

# v4.4: Fresh HF Space (hamza-02/QuizBot), single-platform only (Render OFF).
# Previous HF account was banned for running HF Space + Render simultaneously
# (dual-webhook/dual-instance ToS violation). This time only HF Space is live.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf https://hamza-02:${HF_TOKEN}@huggingface.co/spaces/hamza-02/QuizBot
          git push hf main:main --force
