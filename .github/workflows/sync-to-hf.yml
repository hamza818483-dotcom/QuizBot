name: Sync to Hugging Face Space (DISABLED — HF account banned)

# v4.3: HF account permanently banned (ToS violation). This workflow is
# disabled — no more push trigger — to avoid wasting Actions minutes on
# guaranteed-fail pushes. Kept as workflow_dispatch only in case HF
# access is restored later.

on:
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf https://HamzaHF2:${HF_TOKEN}@huggingface.co/spaces/HamzaHF2/AtlasBoss
          git push hf main --force
