name: Watchdog 1 (5min) + Confirmed Down Alert

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping_and_alert:
    runs-on: ubuntu-latest
    steps:
      # Confirmed check — 3 attempts, 10s apart. Single ping failure ≠ down
      # (could be cold-start/network blip). Only "down" if ALL 3 attempts fail.
      - name: Confirmed HF Space check (3x retry)
        id: check
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          URL="${HF_SPACE_URL:-https://hamza-02-quizbot.hf.space}"
          FAIL_COUNT=0
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 25 --retry 1 "${URL}/health" || echo "000")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" != "200" ]; then
              FAIL_COUNT=$((FAIL_COUNT+1))
            else
              break
            fi
            [ "$i" -lt 3 ] && sleep 10
          done
          if [ "$FAIL_COUNT" -ge 3 ]; then
            echo "status=DOWN" >> $GITHUB_OUTPUT
            echo "::error::HF Space confirmed DOWN after 3 attempts"
          else
            echo "status=UP" >> $GITHUB_OUTPUT
          fi

      - name: Alert owner if confirmed DOWN
        if: ${{ steps.check.outputs.status == 'DOWN' }}
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          if [ -z "$OWNER_ID" ] || [ -z "$BOT_TOKEN" ]; then exit 0; fi
          URL="${HF_SPACE_URL:-https://hamza-02-quizbot.hf.space}"
          MSG="🚨 CRITICAL: HF Space DOWN (confirmed 3x)!%0A%0AURL: ${URL}%0A%0ABot possibly OFFLINE — HF Space may be sleeping/crashed. Manual check needed."
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${OWNER_ID}" -d "text=${MSG}" || true
