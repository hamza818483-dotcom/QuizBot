name: "[DISABLED] Deploy Worker to Cloudflare (obsolete - now using Pages auto-deploy)"

# NOTE (2026-07-08): This workflow deployed to Cloudflare WORKERS, which HF
# Space cannot reach (*.workers.dev is blocked from HF's network). Migrated to
# Cloudflare PAGES (quizbot.pages.dev) instead, which HF can reach fine.
# The Pages project is Git-connected and auto-deploys on every push to main —
# no GitHub Action needed for that anymore. Kept here disabled for reference.
# See docs/DEPLOYMENT_SETUP.md for full details.

on:
  workflow_dispatch:  # manual-only, no automatic trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
