name: Keep Render & HF Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # প্রতি 5 মিনিট — Render 15min sleep এর আগেই ping
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render (keep-alive)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "${{ secrets.RENDER_URL }}/health")
          echo "Render: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Render not responding!"
          fi

      - name: Ping HF Space (keep-alive)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "${{ secrets.HF_SPACE_URL }}/health")
          echo "HF: $STATUS"
