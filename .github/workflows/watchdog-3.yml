name: Watchdog 3 (13min)

on:
  schedule:
    - cron: '*/13 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          URL="${HF_SPACE_URL:-https://hamza-02-quizbot.hf.space}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --retry 2 "${URL}/health" || echo "000")
          echo "HF Space: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::watchdog-3 HF Space ping failed ($STATUS)"
            exit 1
          fi
