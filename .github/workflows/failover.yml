name: Bot Failover — CF → Render

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes — 3x coverage within Render's 15-min sleep window
  workflow_dispatch:

jobs:
  failover:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Ping Render to prevent sleep (always)
        run: |
          curl -s --max-time 12 "https://quizbot-s482.onrender.com/health" || true
          echo "Render pinged"

      - name: Check CF Worker health
        id: cf_check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 8 \
            "https://atlasquizbotpro.hamza818483.workers.dev/health" || echo "000")
          echo "cf_status=$STATUS" >> $GITHUB_OUTPUT
          echo "CF Worker status: $STATUS"

      - name: Switch to Render if CF fails
        if: steps.cf_check.outputs.cf_status != '200'
        run: |
          echo "⚠️ CF down — waking Render and switching webhook"
          # Wake Render (may take 30-50s if sleeping)
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
              "https://quizbot-s482.onrender.com/health" || echo "000")
            echo "Render wake attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then break; fi
            sleep 10
          done
          # Set Render webhook
          RESULT=$(curl -s "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/setWebhook" \
            -d "url=https://quizbot-s482.onrender.com/webhook" \
            -d "drop_pending_updates=false")
          echo "Webhook → Render: $RESULT"

      - name: Restore HF webhook if CF is back
        if: steps.cf_check.outputs.cf_status == '200'
        run: |
          CURRENT=$(curl -s "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/getWebhookInfo" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('url',''))" 2>/dev/null || echo "")
          if [[ "$CURRENT" == *"onrender.com"* ]]; then
            echo "🔄 CF back — restoring HF webhook via CF Worker"
            curl -s "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/setWebhook" \
              -d "url=https://atlasquizbotpro.hamza818483.workers.dev/webhook" \
              -d "drop_pending_updates=false"
            echo "Webhook → CF Worker restored"
          else
            echo "✅ CF webhook already active"
          fi

      - name: Check if Render itself is down while webhook still points to it
        if: steps.cf_check.outputs.cf_status == '200'
        run: |
          CURRENT=$(curl -s "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/getWebhookInfo" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('url',''))" 2>/dev/null || echo "")
          if [[ "$CURRENT" == *"onrender.com"* ]]; then
            RENDER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
              "https://quizbot-s482.onrender.com/health" || echo "000")
            echo "Render health while active: $RENDER_STATUS"
            if [ "$RENDER_STATUS" != "200" ]; then
              echo "⚠️ Render down while it's the active webhook, but CF is healthy — switching back to CF"
              curl -s "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/setWebhook" \
                -d "url=https://atlasquizbotpro.hamza818483.workers.dev/webhook" \
                -d "drop_pending_updates=false"
              echo "Webhook → CF Worker restored (Render was down)"
            fi
          fi

