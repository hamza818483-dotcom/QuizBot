name: Bot Failover — CF → Render

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:        # Manual trigger

jobs:
  failover:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Check CF Worker health
        id: cf_check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 8 \
            "https://atlasquizbotpro.hamza818483.workers.dev/health" || echo "000")
          echo "cf_status=$STATUS" >> $GITHUB_OUTPUT
          echo "CF Worker status: $STATUS"

      - name: Check HF Space health
        id: hf_check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            "https://hamzahf1-atlasboss.hf.space/health" || echo "000")
          echo "hf_status=$STATUS" >> $GITHUB_OUTPUT
          echo "HF Space status: $STATUS"

      - name: Switch to Render if CF fails
        if: steps.cf_check.outputs.cf_status != '200'
        run: |
          echo "⚠️ CF Worker down (status: ${{ steps.cf_check.outputs.cf_status }}) — switching to Render"
          RESULT=$(curl -s "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/setWebhook" \
            -d "url=https://quizbot-s482.onrender.com/webhook" \
            -d "drop_pending_updates=false")
          echo "Webhook set result: $RESULT"
          # Wake up Render
          curl -s --max-time 15 "https://quizbot-s482.onrender.com/health" || true

      - name: Restore HF webhook if CF is back
        if: steps.cf_check.outputs.cf_status == '200'
        run: |
          # Check current webhook
          CURRENT=$(curl -s "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/getWebhookInfo" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('url',''))")
          echo "Current webhook: $CURRENT"
          
          if [[ "$CURRENT" == *"onrender.com"* ]]; then
            echo "🔄 CF back — restoring HF webhook"
            RESULT=$(curl -s "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/setWebhook" \
              -d "url=https://atlasquizbotpro.hamza818483.workers.dev/webhook" \
              -d "drop_pending_updates=false")
            echo "Restore result: $RESULT"
          else
            echo "✅ HF webhook already active — no change needed"
          fi

      - name: Ping Render to prevent sleep
        run: |
          curl -s --max-time 10 "https://quizbot-s482.onrender.com/health" || true
          echo "Render pinged"
